  <ul class="sidebar-posts">
    {% assign sorted_posts = site.posts | sort: 'date' | reverse %}
    {% for post in sorted_posts %}

  </ul>
  <h3>Guides</h3>
  <ul class="sidebar-posts">
    <li><a href="/neuron-performance-book/">Neuron Performance Book</a></li>
  </ul>
</nav>

{{ content }}
